# docker-compose.yml — yolo-boost + MLflow server
#
# Usage:
#   docker compose up mlflow          # start the MLflow UI only
#   docker compose run boost init     # scaffold .yolo-boost-config
#   docker compose run boost run --preset quick --data /workspace/data/data.yaml
#
# Mount your dataset at ./data/ before running.

services:

  # ── MLflow tracking server ─────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.13.2
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri /mlruns
        --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlruns:/mlruns
    restart: unless-stopped

  # ── yolo-boost optimizer ───────────────────────────────────────────────────
  boost:
    build: .
    image: yolo-boost:latest
    depends_on:
      - mlflow
    environment:
      # Point at the MLflow container — override in .env if using an external server
      MLFLOW_TRACKING_URI: http://mlflow:5000
    env_file:
      - .yolo-boost-config    # created by `yolo-boost init`
    volumes:
      - ./data:/workspace/data       # your dataset (read-only is fine)
      - ./runs:/workspace/runs       # YOLO training outputs + best.pt weights
      - mlruns:/workspace/mlruns     # shared with the MLflow container
    # GPU support — comment out if running on CPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mlruns:
